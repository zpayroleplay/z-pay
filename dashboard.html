<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Z-Pay | Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">

    <h1 class="logo dash-logo"><span class="logo-z">Z</span>-Pay</h1>

    <div class="dash-grid">

      <div class="dash-card dash-card-dark dash-saldo" onclick="window.location.href='saldo.html'">
        <span class="dash-card-icon">+</span>
        <p class="dash-card-label">Saldo</p>
        <span class="dash-arrow">→</span>
      </div>

      <div class="dash-card dash-card-light" onclick="window.location.href='transferencias.html'">
        <span class="dash-card-icon">+</span>
        <p class="dash-card-label">Transferencia</p>
      </div>

      <div class="dash-card dash-card-light" onclick="window.location.href='prestamos.html'">
        <span class="dash-card-icon">+</span>
        <p class="dash-card-label">Préstamos</p>
      </div>

      <div class="dash-card dash-card-light" onclick="window.location.href='deudas.html'">
        <span class="dash-card-icon">+</span>
        <p class="dash-card-label">Deudas</p>
      </div>

      <div class="dash-card dash-card-dark" onclick="window.location.href='movimientos.html'">
        <span class="dash-card-icon">+</span>
        <p class="dash-card-label">Movimientos</p>
      </div>

      <div class="dash-card dash-card-dark" onclick="window.location.href='notificaciones.html'">
        <span class="dash-card-icon">+</span>
        <p class="dash-card-label">Notificaciones <span id="notif-badge" style="display:none; background:#ef4444; color:white; border-radius:50%; padding:2px 8px; font-size:14px; margin-left:6px"></span></p>
      </div>

      <div class="dash-card dash-card-dark" onclick="window.location.href='gestionar-cuenta.html'">
        <span class="dash-card-icon">+</span>
        <p class="dash-card-label">Gestionar cuenta</p>
      </div>

      <div class="dash-card dash-card-dark" id="btn-cerrar-sesion">
        <span class="dash-card-icon">+</span>
        <p class="dash-card-label">Cerrar sesión</p>
      </div>

      <!-- TARJETA EMPRESA (oculta por defecto) -->
      <div class="dash-card dash-card-dark" id="tarjeta-empresa" style="display:none" onclick="window.location.href='empresa.html'">
        <span class="dash-card-icon">🏢</span>
        <p class="dash-card-label">Z-Pay Empresas</p>
        <p id="empresa-nombre" class="dash-perfil-cuenta"></p>
      </div>

      <div class="dash-card dash-card-dark dash-perfil">
        <span class="dash-perfil-icon">👤</span>
        <p id="dash-nombre" class="dash-perfil-nombre">Cargando...</p>
        <p id="dash-cuenta" class="dash-perfil-cuenta">Número de cuenta: —</p>
      </div>

    </div>

    <!-- SECCIÓN TRABAJO (oculta por defecto) -->
    <div id="seccion-trabajo" style="display:none; width:100%">
      <p class="admin-dash-bienvenida" style="margin-top:0; margin-bottom:16px; font-size:18px; letter-spacing:1px">
        💼 TRABAJO — <span id="trabajo-empresa-nombre"></span>
      </p>
      <div class="admin-dash-grid" style="max-width:500px">
        <div class="dash-card dash-card-dark" onclick="window.location.href='empleado-cobrar.html'">
          <span class="dash-card-icon">+</span>
          <p class="dash-card-label">Cobrar a cliente</p>
        </div>
        <div class="dash-card dash-card-light" onclick="window.location.href='empleado-cobros.html'">
          <span class="dash-card-icon">+</span>
          <p class="dash-card-label">Mis cobros</p>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="dashboard.js"></script>

  <!-- POPUP DE COBRO -->
  <div id="cobro-popup" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h2 class="modal-titulo">💳 Pago pendiente</h2>
      <p id="cobro-popup-empresa" class="modal-subtitulo"></p>
      <p id="cobro-popup-concepto" style="color:#333; font-size:15px; text-align:center"></p>
      <p id="cobro-popup-monto" style="color:#0b3dff; font-size:28px; font-weight:800; text-align:center"></p>
      <div class="modal-botones">
        <button id="cobro-popup-aceptar" class="btn-acreditar modal-btn">ACEPTAR</button>
        <button id="cobro-popup-rechazar" class="btn-retirar modal-btn">RECHAZAR</button>
      </div>
    </div>
  </div>

</body>
</html>
