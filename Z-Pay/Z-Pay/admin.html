<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Z-Pay | Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <!-- HEADER -->
    <div class="header">
      <span class="header-home" onclick="window.location.href='admin-dashboard.html'">🏠</span>
      <h1 class="header-title">ADMINISTRAR SALDOS</h1>
      <h1 class="logo header-logo"><span class="logo-z">Z</span>-Pay</h1>
    </div>
    <div class="header-bar"></div>

    <!-- CONTENIDO -->
    <div class="admin-content">

      <!-- FORMULARIO CREAR USUARIO -->
      <div class="admin-card">
        <h2 class="admin-card-title">Crear nuevo usuario</h2>
        <div class="admin-form">
          <input type="text" id="nuevo-nombre" placeholder="Nombre" />
          <input type="text" id="nuevo-apellido" placeholder="Apellido" />
          <input type="text" id="nuevo-username" placeholder="ID de PlayStation" />
          <input type="password" id="nuevo-password" placeholder="Contraseña" />
          <select id="nuevo-rol" class="admin-select">
  <option value="user">Cliente</option>
  <option value="admin">Admin</option>
</select>
          <button class="btn-acreditar" onclick="crearUsuario()">CREAR USUARIO</button>
        </div>
        <p id="msg-crear" class="admin-msg"></p>
        <!-- ACCESO A PRÉSTAMOS -->
<div class="admin-card" style="margin-top: 0">
  <h2 class="admin-card-title">Solicitudes de préstamos</h2>
  <p style="color:#555; margin-bottom:16px">Revisá y gestioná las solicitudes pendientes de los jugadores.</p>
  <button class="btn-acreditar" onclick="window.location.href='prestamos-admin.html'">VER SOLICITUDES</button>
</div>
      </div>

      <!-- TABLA DE USUARIOS -->
      <div class="admin-tabla-container">
        <table class="admin-tabla">
          <thead>
            <tr>
              <th>ID PlayStation</th>
              <th>Nombre</th>
              <th>N° Cuenta</th>
              <th>Saldo U$D</th>
              <th>Sueldo U$D</th>
<th>Acreditar</th>
<th>Sueldo</th>
<th>Retirar</th>
            </tr>
          </thead>
          <tbody id="tabla-usuarios">
            <tr><td colspan="6">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h2 id="modal-titulo" class="modal-titulo"></h2>
      <p id="modal-subtitulo" class="modal-subtitulo"></p>
      <input type="number" id="modal-monto" class="modal-input" placeholder="Monto U$D" min="0" />
      <div class="modal-botones">
        <button id="modal-confirmar" class="btn-acreditar modal-btn">CONFIRMAR</button>
        <button class="btn-retirar modal-btn" onclick="cerrarModal()">CANCELAR</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>

</body>
</html>
