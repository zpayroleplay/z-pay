<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Z-Pay | Cobrar a cliente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">

    <div class="header">
      <span class="header-home" onclick="window.location.href='dashboard.html'">🏠</span>
      <h1 class="header-title">COBRAR A CLIENTE</h1>
      <span class="header-logo logo"><span class="logo-z">Z</span>-Pay</span>
    </div>
    <div class="header-bar"></div>

    <div class="admin-content">
      <div class="admin-card">
        <p class="admin-card-title" id="cobrar-titulo">Generar cobro a cliente</p>
        <p style="color:#888; font-size:14px; margin-bottom:16px">
          En nombre de: <strong id="cobrar-empresa"></strong> — <span id="cobrar-cargo"></span>
        </p>
        <div class="admin-form">
          <input id="cobrar-destino" type="text" placeholder="Alias o N° cuenta del cliente" style="height:45px; border-radius:10px; border:1px solid #ccc; padding:0 16px; font-size:16px; flex:1; min-width:200px">
          <input id="cobrar-monto" type="number" placeholder="Monto U$D" style="height:45px; border-radius:10px; border:1px solid #ccc; padding:0 16px; font-size:16px; flex:1; min-width:150px">
          <input id="cobrar-concepto" type="text" placeholder="Concepto (ej: Carga de nafta 50L)" style="height:45px; border-radius:10px; border:1px solid #ccc; padding:0 16px; font-size:16px; flex:1; min-width:200px">
          <button class="btn-acreditar" id="btn-cobrar" style="height:45px; padding:0 24px; font-size:15px">COBRAR</button>
        </div>
        <p id="cobrar-msg" style="margin-top:12px; font-size:14px; color:green; min-height:20px"></p>
      </div>
    </div>

  </div>
  <script type="module" src="empleado-cobrar.js"></script>
</body>
</html>
