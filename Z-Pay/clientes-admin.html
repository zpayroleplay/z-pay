<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Z-Pay | Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <!-- HEADER -->
    <div class="header">
      <span class="header-home" onclick="window.location.href='admin-dashboard.html'">🏠</span>
      <h1 class="header-title">CLIENTES</h1>
      <h1 class="logo header-logo"><span class="logo-z">Z</span>-Pay</h1>
    </div>
    <div class="header-bar"></div>

    <!-- TABLA -->
    <div class="admin-content">
      <div class="admin-tabla-container">
        <table class="admin-tabla">
          <thead>
            <tr>
              <th>ID PSN</th>
              <th>Nombre</th>
              <th>Eliminar</th>
            </tr>
          </thead>
          <tbody id="tabla-clientes">
            <tr><td colspan="3">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h2 id="modal-titulo" class="modal-titulo"></h2>
      <p id="modal-subtitulo" class="modal-subtitulo"></p>
      <div class="modal-botones">
        <button id="modal-confirmar" class="btn-retirar modal-btn">ELIMINAR</button>
        <button class="btn-acreditar modal-btn" onclick="cerrarModal()">CANCELAR</button>
      </div>
    </div>
  </div>

  <script type="module" src="clientes-admin.js"></script>

</body>
</html>
